services:
  admin:
    image: node:25.8.1-alpine3.23
    working_dir: /app
    restart: unless-stopped
    ports:
      - "4173:4173"
    volumes:
      - .:/app:delegated
      - admin-node-modules:/app/node_modules
    command: ["sh", "-lc", "npm ci --silent && npm run dev"]
    environment:
      NODE_ENV: "development"

volumes:
  admin-node-modules:
